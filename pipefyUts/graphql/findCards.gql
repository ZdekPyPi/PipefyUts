query {
  findCards(
    pipeId: $pipe_id$,
    search: 
      { fieldId: "$field_id$", fieldValue: "$field_value$" }
    
  ) {

    edges {
      node {
        pipe {
          id
          name
        }
        id
        title
        created_at
        createdBy {
          id
          name
        }
        due_date
        current_phase {
          id
          name
      }
      }
    }
  }
}
